<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Browser</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #1e1e1e;
        color: white;
    }

    .toolbar {
        display: flex;
        padding: 10px;
        background: #2d2d2d;
        gap: 10px;
    }

    input {
        flex: 1;
        padding: 8px;
        border-radius: 5px;
        border: none;
        outline: none;
    }

    button {
        padding: 8px 12px;
        border: none;
        border-radius: 5px;
        background: #4CAF50;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #45a049;
    }

    iframe {
        width: 100%;
        height: calc(100vh - 60px);
        border: none;
        background: white;
    }
</style>
</head>
<body>

<div class="toolbar">
    <button onclick="goBack()">⬅</button>
    <button onclick="goForward()">➡</button>
    <input type="text" id="url" placeholder="Enter URL (e.g. https://example.com)">
    <button onclick="loadPage()">Go</button>
</div>

<iframe id="browser" src="https://example.com"></iframe>

<script>
    const iframe = document.getElementById("browser");

    function loadPage() {
        let url = document.getElementById("url").value.trim();

        if (!url.startsWith("http")) {
            url = "https://" + url;
        }

        iframe.src = url;
    }

    function goBack() {
        iframe.contentWindow.history.back();
    }

    function goForward() {
        iframe.contentWindow.history.forward();
    }
</script>

</body>
</html>
